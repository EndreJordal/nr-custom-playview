<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NR custom playview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32.png"
    />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#19191c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Datasheet" />
    <script src="strats.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div id="drop-zone">
      <h2>Drop New Recruit JSON or .ros here</h2>
      <span class="drop-zone__hint">or click to browse</span>
      <input type="file" id="file-input" accept=".json,.ros" title="file-input" />
    </div>
    <div id="recent-rosters-container"></div>

    <!-- The header and units will dynamically mount inside this single container -->
    <div id="roster-container"></div>
  </body>
</html>
